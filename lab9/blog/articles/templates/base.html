<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <img class="logo" src="{% static 'img/dpb-logo.png' %}" alt="Логотип">
            <div class="header-text-area">
                <div class="auth-links">
                    {% if user.is_authenticated %}
                        <span class="username">{{ user.username }}</span>
                        <a href="{% url 'logout' %}" class="auth-link">Выйти</a>
                    {% else %}
                        <a href="{% url 'register' %}" class="auth-link">Регистрация</a>
                        <a href="{% url 'login' %}" class="auth-link">Вход</a>
                    {% endif %}
                </div>
            </div>
            
            <!-- Три иконки для параллакса (как в методичке) -->
            <div class="icons-for-parallax">
                <img class="icon-for-parallax-first" src="{% static 'img/icon.png' %}">
                <img class="icon-for-parallax-second" src="{% static 'img/icon.png' %}">
                <img class="icon-for-parallax-third" src="{% static 'img/icon.png' %}">
            </div>
        </div>
    </header>
    
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    
    <script src="{% static 'js/jquery.js' %}"></script>
    <script src="{% static 'js/parallax.js' %}"></script>
</body>
</html>
