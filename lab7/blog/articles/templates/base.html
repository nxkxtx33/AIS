<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <header class="header">
        <div class="header-container">
            <img class="logo" src="{% static 'img/dpb-logo.png' %}" alt="Логотип">
            <div class="header-text-area">
                <p class="service-title"></p>
                <div class="auth-links-header">
                    {% if user.is_authenticated %}
                        <span class="username">{{ user.username }}</span>
                        <a href="{% url 'logout' %}" class="auth-link">Выйти</a>
                    {% else %}
                        <a href="{% url 'register' %}" class="auth-link">Регистрация</a>
                        <a href="{% url 'login' %}" class="auth-link">Вход</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </header>
    
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Подключение JavaScript-->
    <script src="{% static 'js/fold-post.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
